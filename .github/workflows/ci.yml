name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# This fork adds the "kicad-review" design-review layer on top of
# lamaalrajih/kicad-mcp. CI validates THAT layer — the review engine
# (kicad_mcp/review), the review MCP tools, the CLI shim, and their tests.
# The inherited upstream modules carry pre-existing lint/format debt under the
# pinned ruff and are intentionally out of scope here. Paths checked:
#   kicad_mcp/review  kicad_mcp/tools/review_tools.py  lib  kicad_mcp/__init__.py
#   tests/test_review_periph.py

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint and Format

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true

    - name: Set up Python 3.12
      run: |
        uv python install 3.12
        uv python pin 3.12

    - name: Install dependencies
      run: uv sync --group dev

    - name: Lint with ruff (review layer)
      run: uv run ruff check kicad_mcp/review kicad_mcp/tools/review_tools.py lib kicad_mcp/__init__.py tests/test_review_*.py

    - name: Check formatting with ruff (review layer)
      run: uv run ruff format --check kicad_mcp/review kicad_mcp/tools/review_tools.py lib kicad_mcp/__init__.py tests/test_review_*.py

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        exclude:
          - os: macos-latest
            python-version: "3.10"

    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      run: |
        uv python install ${{ matrix.python-version }}
        uv python pin ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --group dev

    # The review engine's integration tests require a real KiCad install + board,
    # which CI does not have, so they skip automatically. The unit tests (parse /
    # checks / report / engine surfaces on synthetic data) always run. Confirmed bugs
    # are encoded as strict xfails (they flip the suite red the day they are fixed).
    - name: Run tests (review layer)
      run: uv run python -m pytest tests/test_review_*.py -o addopts="" -v --cov=kicad_mcp/review --cov-report=xml --cov-fail-under=70

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    name: Security Scan

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true

    - name: Set up Python 3.12
      run: |
        uv python install 3.12
        uv python pin 3.12

    - name: Install dependencies
      run: uv sync --group dev

    - name: Run security scan (review layer)
      run: uv run bandit -q -r kicad_mcp/review kicad_mcp/tools/review_tools.py lib

  build:
    runs-on: ubuntu-latest
    name: Build Package
    needs: [lint, test]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true

    - name: Set up Python 3.12
      run: |
        uv python install 3.12
        uv python pin 3.12

    - name: Build package
      run: uv build

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
